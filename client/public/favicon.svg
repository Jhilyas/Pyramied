<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34C759"/>
      <stop offset="100%" style="stop-color:#2E8B57"/>
    </linearGradient>
    <linearGradient id="pyr-light" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="pyr-shade" x1="100%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Pyramid - left face (lighter) -->
  <polygon points="50,18 22,78 50,68" fill="url(#pyr-light)"/>
  <!-- Pyramid - right face (darker/shaded) -->
  <polygon points="50,18 78,78 50,68" fill="url(#pyr-shade)"/>
  <!-- Base line for depth -->
  <line x1="22" y1="78" x2="78" y2="78" stroke="white" stroke-opacity="0.9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Subtle glow at apex -->
  <circle cx="50" cy="18" r="3" fill="white" opacity="0.6"/>
</svg>
